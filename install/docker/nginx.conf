# ==========================================================
# JIR — Nginx virtual-host (Docker: proxies to app:9000)
# ==========================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 12M;

    # ── Logging ──────────────────────────────────────────
    access_log /var/log/nginx/jir_access.log;
    error_log  /var/log/nginx/jir_error.log;

    # ── Front controller ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # ── PHP-FPM (TCP to app container) ───────────────────
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;
    }

    # ── Static assets ────────────────────────────────────
    location ~* \.(css|js|ico|gif|jpe?g|png|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Deny dotfiles ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Block sensitive paths ────────────────────────────
    location ~ ^/(src|config|database|storage|cli|vendor|install|tests|templates)/ {
        deny all;
        return 404;
    }
}
