; ==========================================================
; JIR — PHP production overrides for Docker container
; ==========================================================

[PHP]
upload_max_filesize = 10M
post_max_size       = 12M
memory_limit        = 256M
max_execution_time  = 30
expose_php          = Off
date.timezone       = UTC

; Error handling
display_errors     = Off
display_startup_errors = Off
log_errors         = On
error_log          = /var/www/html/storage/logs/php-error.log
error_reporting    = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Realpath cache — reduces stat() calls during autoloading
realpath_cache_size = 4096k
realpath_cache_ttl  = 600

[Session]
session.cookie_httponly  = 1
session.cookie_samesite  = Strict
session.use_strict_mode  = 1
session.use_only_cookies = 1
session.gc_maxlifetime   = 1800

[opcache]
opcache.enable                  = 1
opcache.memory_consumption      = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 20000
; Production: skip file timestamp validation (deploy must clear cache)
opcache.validate_timestamps     = 0
opcache.revalidate_freq         = 0
opcache.save_comments           = 1
opcache.max_wasted_percentage   = 10
; Preload could be added for Slim routes in future
; opcache.preload = /var/www/html/config/preload.php
; opcache.preload_user = www-data

[mysqlnd]
mysqlnd.collect_statistics         = Off
mysqlnd.collect_memory_statistics  = Off
